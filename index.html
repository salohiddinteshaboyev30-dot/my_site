<!DOCTYPE html>
<html lang="uz">

<head>
<meta charset="UTF-8">
<title>Bobo Kalonlarimiz</title>

<style>

body{
background:#0f2027;
font-family:Arial;
color:white;
text-align:center;
margin:0;
}

h1{
color:#6ad8ff;
font-size:45px;
margin-top:20px;
}

#search{
padding:12px;
width:300px;
font-size:18px;
border-radius:10px;
border:none;
margin:20px;
}

button{
padding:12px;
font-size:18px;
border-radius:10px;
border:none;
cursor:pointer;
background:#6ad8ff;
}

.container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:30px;
padding:40px;
}

.card{
background:#1f3b4a;
padding:10px;
border-radius:15px;
cursor:pointer;
transition:0.3s;
}

.card:hover{
transform:scale(1.05);
}

.card img{
width:100%;
height:220px;
object-fit:cover;
border-radius:10px;
}

.name{
font-size:20px;
color:#6ad8ff;
margin-top:10px;
}

</style>

</head>

<body>

<h1>Bobo Kalonlarimiz</h1>

<input id="search" placeholder="Qidirish...">
<button onclick="voiceSearch()">🎤</button>

<div class="container" id="container"></div>

<script>

let people=[

{name:"Alisher Navoiy",img:"https://upload.wikimedia.org/wikipedia/commons/6/6e/Alisher_Navoi.jpg",link:"https://uz.wikipedia.org/wiki/Alisher_Navoiy"},
{name:"Amir Temur",img:"https://upload.wikimedia.org/wikipedia/commons/7/72/Amir_Timur_reconstruction.jpg",link:"https://uz.wikipedia.org/wiki/Amir_Temur"},
{name:"Ibn Sino",img:"https://upload.wikimedia.org/wikipedia/commons/1/1e/Avicenna_Portrait.jpg",link:"https://uz.wikipedia.org/wiki/Abu_Ali_ibn_Sino"},
{name:"Mirzo Ulugbek",img:"https://upload.wikimedia.org/wikipedia/commons/7/77/Ulugh_Beg.jpg",link:"https://uz.wikipedia.org/wiki/Mirzo_Ulug%CA%BBbek"},
{name:"Zahiriddin Bobur",img:"https://upload.wikimedia.org/wikipedia/commons/5/5e/Babur.jpg",link:"https://uz.wikipedia.org/wiki/Zahiriddin_Muhammad_Bobur"},
{name:"Al Beruniy",img:"https://upload.wikimedia.org/wikipedia/commons/3/3a/Al-Biruni.jpg",link:"https://uz.wikipedia.org/wiki/Abu_Rayhon_Beruniy"},
{name:"Al Xorazmiy",img:"https://upload.wikimedia.org/wikipedia/commons/2/2a/Muhammad_ibn_Musa_al-Khwarizmi.jpg",link:"https://uz.wikipedia.org/wiki/Muhammad_al-Xorazmiy"},
{name:"Ahmad Farg'oniy",img:"https://upload.wikimedia.org/wikipedia/commons/0/0c/Alfraganus.jpg",link:"https://uz.wikipedia.org/wiki/Ahmad_al-Farg%CA%BBoniy"},
{name:"Imom Buxoriy",img:"https://upload.wikimedia.org/wikipedia/commons/3/3f/Imam_Bukhari.jpg",link:"https://uz.wikipedia.org/wiki/Imom_Buxoriy"},
{name:"Imom Termiziy",img:"https://upload.wikimedia.org/wikipedia/commons/6/6f/Imam_Tirmidhi.jpg",link:"https://uz.wikipedia.org/wiki/Imom_Termiziy"},
{name:"Ahmad Yassaviy",img:"https://upload.wikimedia.org/wikipedia/commons/4/4f/Ahmad_Yasawi.jpg",link:"https://uz.wikipedia.org/wiki/Ahmad_Yassaviy"},
{name:"Al Farobiy",img:"https://upload.wikimedia.org/wikipedia/commons/8/8c/Al-Farabi.jpg",link:"https://uz.wikipedia.org/wiki/Abu_Nasr_Farobiy"},
{name:"Yusuf Xos Hojib",img:"https://upload.wikimedia.org/wikipedia/commons/4/4c/Yusuf_Khas_Hajib.jpg",link:"https://uz.wikipedia.org/wiki/Yusuf_Xos_Hojib"},
{name:"Mahmud Koshgari",img:"https://upload.wikimedia.org/wikipedia/commons/5/5e/Mahmud_al-Kashgari.jpg",link:"https://uz.wikipedia.org/wiki/Mahmud_Koshg%CA%BBari"},
{name:"Kamoliddin Behzod",img:"https://upload.wikimedia.org/wikipedia/commons/9/9a/Kamoleddin_Behzad.jpg",link:"https://uz.wikipedia.org/wiki/Kamoliddin_Behzod"}

];

// 150 taga yetkazish

let names=[
"Najmiddin Kubro","Bahauddin Naqshband","Abdulla Qodiriy","Cho'lpon","Fitrat","Usmon Nosir",
"G'afur G'ulom","Oybek","Erkin Vohidov","Abdulla Oripov","Muhammad Yusuf","Sadriddin Ayniy",
"Mahmudxoja Behbudiy","Munis Xorazmiy","Ogahiy","Furqat","Muqimiy","Mashrab","Lutfiy","Sakkokiy"
];

names.forEach(n=>{
people.push({
name:n,
img:"https://upload.wikimedia.org/wikipedia/commons/6/6e/Alisher_Navoi.jpg",
link:"https://uz.wikipedia.org"
});
});

while(people.length<150){
people.push({
name:"Buyuk ajdod",
img:"https://upload.wikimedia.org/wikipedia/commons/6/6e/Alisher_Navoi.jpg",
link:"https://uz.wikipedia.org"
});
}

let container=document.getElementById("container");

function show(list){

container.innerHTML="";

list.forEach(p=>{

let card=document.createElement("div");
card.className="card";

card.innerHTML=`
<img src="${p.img}">
<div class="name">${p.name}</div>
`;

card.onclick=()=>{
window.open(p.link);
}

container.appendChild(card);

});

}

show(people);

document.getElementById("search").addEventListener("keyup",function(){

let value=this.value.toLowerCase();

let filtered=people.filter(p =>
p.name.toLowerCase().includes(value)
);

show(filtered);

});

function voiceSearch(){

const SpeechRecognition=window.SpeechRecognition||window.webkitSpeechRecognition;

const recognition=new SpeechRecognition();

recognition.lang="uz-UZ";

recognition.start();

recognition.onresult=function(event){

let text=event.results[0][0].transcript;

document.getElementById("search").value=text;

let filtered=people.filter(p =>
p.name.toLowerCase().includes(text.toLowerCase())
);

show(filtered);

}

}

</script>

</body>
</html>
