<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>O‘zbek Bobokalonlari</title>

<style>
body{
margin:0;
font-family:Arial;
background:url("https://images.unsplash.com/photo-1524492412937-b28074a5d7da?q=80&w=1920") no-repeat center/cover;
color:white;
text-align:center;
}

header{
display:flex;
justify-content:center;
align-items:center;
gap:15px;
padding:20px;
background:rgba(0,0,0,0.5);
}

.logo{
width:60px;
height:60px;
}

h1{
margin:0;
font-size:32px;
}

.searchBox{
margin:20px;
}

input{
padding:10px;
width:250px;
border:none;
border-radius:8px;
font-size:16px;
}

button{
padding:10px;
border:none;
border-radius:8px;
cursor:pointer;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
padding:20px;
}

.card{
background:rgba(0,0,0,0.6);
border-radius:15px;
padding:15px;
transition:0.3s;
}

.card:hover{
transform:scale(1.05);
}

.card img{
width:100%;
height:200px;
object-fit:cover;
border-radius:10px;
}

.card h3{
margin-top:10px;
}
</style>
</head>

<body>

<header>

<svg class="logo" viewBox="0 0 100 100">
<circle cx="50" cy="50" r="45" fill="gold"/>
<text x="50" y="60" font-size="40" text-anchor="middle" fill="black">U</text>
</svg>

<h1>O‘zbek Bobokalonlari</h1>

<div class="searchBox">
<input type="text" id="search" placeholder="Bobokalonni qidir...">
<button onclick="voiceSearch()">🎤</button>

const grid=document.getElementById("grid");

function render(list){

grid.innerHTML="";

list.forEach(p=>{

let img=p.img ? p.img :
"https://upload.wikimedia.org/wikipedia/commons/8/89/Portrait_Placeholder.png";

let card=document.createElement("div");
card.className="card";

card.innerHTML=`
<img src="${img}">
<h3>${p.name}</h3>
`;

grid.appendChild(card);

});

}

render(people);

document.getElementById("search").addEventListener("input",e=>{

let text=e.target.value.toLowerCase();

let filtered=people.filter(p=>p.name.toLowerCase().includes(text));

render(filtered);

});

function voiceSearch(){

if(!('webkitSpeechRecognition' in window)){
alert("Brauzer ovozli qidiruvni qo‘llamaydi");
return;
}

let rec=new webkitSpeechRecognition();
rec.lang="uz-UZ";

rec.onresult=function(e){

let text=e.results[0][0].transcript;

document.getElementById("search").value=text;

let filtered=people.filter(p=>p.name.toLowerCase().includes(text.toLowerCase()));

render(filtered);

}

rec.start();

}
